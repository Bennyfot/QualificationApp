<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
			font-family: 'DejaVu', sans-serif;
		}
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 8px; 
            font-size: 10px; 
            text-align: left; 
        }
        th { 
            background-color: #f2f2f2; 
        }
        .header { 
            margin-bottom: 20px; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Отчет по развитию компетенций</h2>
        <p>Дата формирования: {{ now|date:"d.m.Y H:i" }}</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>Сотрудник</th>
                <th>Навык</th>
                <th>Уровень (%)</th>
                <th>Основание</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp|date:"d.m.Y" }}</td>
                <td>{{ log.employee.name }}</td>
                <td>{{ log.skill_detail.name }}</td>
                <td>{{ log.level_reached }}</td>
                <td>{{ log.reason }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
