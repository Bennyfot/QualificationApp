{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Панель администратора</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Загрузка профстандарта (XML)</h3>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post" enctype="multipart/form-data">
					{% csrf_token %}
					<div class="mb-3">
						<label for="xml_folder" class="form-label">Выберите папку с профстандартами (XML):</label>
						<input type="file" name="xml_files" id="xml_folder" 
							   class="form-control" webkitdirectory directory multiple>
					</div>
					<button type="submit" class="btn btn-success">Загрузить всю папку</button>
				</form>
            </div>
        </div>
        <div class="mt-3 text-center">
            <a href="/admin/" class="text-muted">Вернуться</a>
        </div>
    </div>
</body>
</html>
