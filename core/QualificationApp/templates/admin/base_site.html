{% extends "admin/base.html" %}

{% block extrahead %}
<style>
    /* Кнопка открытия */
    .open-btn {
        position: fixed;
        top: 60px;
        right: 30px;
        z-index: 999;
        padding: 10px 20px;
        background: #417690;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .open-btn:hover {
        background: #2c4b63;
    }

    /* Боковая панель */
    .side-panel {
        height: 100%;
        width: 0;
        position: fixed;
        z-index: 1000;
        top: 0;
        right: 0;
        background-color: #fff;
        box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        overflow-x: hidden;
        transition: width 0.3s;
        padding-top: 60px;
    }

    /* Кнопка закрытия */
    .side-panel .closebtn {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 28px;
        color: #666;
        text-decoration: none;
        line-height: 1;
    }

    .side-panel .closebtn:hover {
        color: #000;
    }

    /* Контент */
    .import-form {
        padding: 20px;
    }

    .import-form h3 {
        margin: 0 0 20px 0;
        font-size: 18px;
        font-weight: 500;
        color: #333;
    }

    .import-form hr {
        margin: 15px 0;
        border: none;
        border-top: 1px solid #eee;
    }

    /* Формы */
    .import-form form {
        margin-bottom: 25px;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 4px;
    }

    .import-form label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-size: 13px;
    }

    .import-form input[type="file"] {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        background: white;
    }

    .import-form button {
        background: #417690;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .import-form button:hover {
        background: #2c4b63;
    }

    /* Стили для кнопки синхронизации стандартов */
    .sync-btn {
        background: #417690 !important;
        border: 1px solid #1e7e34 !important;
    }

    .sync-btn:hover {
        background: #218838 !important;
    }

    /* Убираем лишние br */
    .import-form br {
        display: none;
    }
</style>
{% endblock %}

{% block content_title %}
    {{ block.super }}
    <button class="open-btn" onclick="openNav()">Импорты XML</button>
    
    <div id="mySidepanel" class="side-panel">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        <div class="import-form">
            <h3>Импорт данных</h3>
            <hr>
            
            <form action="{% url 'sync_standards' %}" method="post">
                {% csrf_token %}
                <label>Профстандарты</label>
                <button type="submit" class="sync-btn">Обновить профстандарты</button>
            </form>

            <form method="post" enctype="multipart/form-data" action="/admin/import/employees/">
                {% csrf_token %}
                <label>Сотрудники</label>
                <input type="file" name="xml_file" required>
                <button type="submit">Обновить сотрудников</button>
            </form>

            <form method="post" enctype="multipart/form-data" action="/admin/import/projects/">
                {% csrf_token %}
                <label>Проекты и задачи</label>
                <input type="file" name="xml_file" required>
                <button type="submit">Обновить проекты</button>
            </form>
        </div>
    </div>

    <script>
        function openNav() { 
            document.getElementById("mySidepanel").style.width = "350px"; 
        }
        
        function closeNav() { 
            document.getElementById("mySidepanel").style.width = "0"; 
        }

        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeNav();
        });
    </script>
{% endblock %}
